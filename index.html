/* Utilities */
function save(key,val){ localStorage.setItem(key, JSON.stringify(val)); }
function load(key){ try{ return JSON.parse(localStorage.getItem(key))||null }catch(e){return null } }
function fmtDate(ts){ const d=new Date(ts); return d.toLocaleDateString('ru-RU') + ' ' + d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}); }
function renderStars(n){ return '<span class="stars">'+('★'.repeat(n)) + ('☆'.repeat(5-n)) + '</span>'; }

/* Storage keys (часть А) */
const APPROVED_KEY = 'am_approved_v4_partA_531';
const PENDING_KEY  = 'am_pending_v4_partA_531';

/* Init */
let approved = seed;
let pending  = load(PENDING_KEY) || [];


/* Pagination */
const approvedListEl = document.getElementById('approvedList');
const loadMoreBtn = document.getElementById('loadMoreBtn');
let approvedLoaded = 0;
const approvedStep = 20;

function renderApprovedChunk(){
  const slice = approved.slice(approvedLoaded, approvedLoaded + approvedStep);
  slice.forEach(r=>{
    const div = document.createElement('div');
    div.className='review';
    div.innerHTML = `
      <div class="avatar">${(r.name||'А').charAt(0)}</div>
      <div class="rbody">
        <div class="rhead">
          <div>
            <div class="rname">${r.name||'Аноним'}</div>
            <div class="rmeta small">${fmtDate(r.date)}</div>
          </div>
          <div class="rmeta">${renderStars(r.rating)}</div>
        </div>
        <div class="text">${r.text}</div>
      </div>`;
    approvedListEl.appendChild(div);
  });
  approvedLoaded += slice.length;
  document.getElementById('approvedCount').textContent = 'Опубликовано: ' + approved.length;
  document.getElementById('totalCount').textContent = 'Всего: ' + (approved.length + pending.length);
  document.getElementById('pendingCount').textContent = 'На модерации: ' + pending.length;
  if(approvedLoaded >= approved.length) loadMoreBtn.style.display='none';
}
renderApprovedChunk();
loadMoreBtn.addEventListener('click', renderApprovedChunk);

<script>
// ---- SAFE PATCH (keeps your original scripts) ----
(function(){
  function ready(fn){
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      setTimeout(fn, 0);
    } else {
      document.addEventListener('DOMContentLoaded', fn);
    }
  }
  ready(function(){
    var listEl = document.getElementById('approvedList');
    var btn = document.getElementById('loadMoreBtn');
    if(!listEl || !btn) return;

    if (btn.__hasSafePatch) return;
    btn.__hasSafePatch = true;

    if (typeof window.renderApprovedChunk === 'function') {
      if (!listEl.children.length) {
        try { window.renderApprovedChunk(); } catch(e){ /* no-op */ }
      }
      btn.addEventListener('click', function(){
        try { window.renderApprovedChunk(); } catch(e){ /* no-op */ }
      });
      return;
    }

    var data = (window.approved && Array.isArray(window.approved) && window.approved.length)
                ? window.approved
                : (window.seed || []);
    var loaded = 0, STEP = 20;

    function fmt(ms){
      var d = new Date(Number(ms || Date.now())); 
      return d.toLocaleString();
    }
    function add(r){
      var div = document.createElement('div');
      div.className = 'review';
      var initial = (r.name || 'А').toString().charAt(0);
      var text = (r.text == null ? '' : String(r.text));
      div.innerHTML = ''
        + '<div class="avatar">'+initial+'</div>'
        + '<div class="rbody">'
        +   '<div class="rhead" style="display:flex;justify-content:space-between;gap:8px">'
        +     '<div><div class="rname"><strong>'+(r.name||'Аноним')+'</strong></div>'
        +     '<div class="rmeta small">'+fmt(r.date)+'</div></div>'
        +   '</div>'
        +   '<div class="text" style="margin-top:8px">'+text+'</div>'
        + '</div>';
      listEl.appendChild(div);
    }
    function draw(){
      var slice = data.slice(loaded, loaded + STEP);
      if (!slice.length) { btn.style.display = 'none'; return; }
      slice.forEach(add);
      loaded += slice.length;
      if (loaded >= data.length) btn.style.display = 'none';
      else btn.style.display = 'flex';
    }
    if (!listEl.children.length) draw();
    btn.addEventListener('click', draw);
  });
})();
// ---- END SAFE PATCH ----
</script>
